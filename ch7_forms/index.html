<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Patient Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:linear-gradient(135deg,#00c6ff,#0072ff,#7b2ff7,#f107a3);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
    padding:30px;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    max-width:1200px;
    margin:auto;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    text-align:center;
    color:#0056b3;
    margin-bottom:25px;
}

fieldset{
    border:3px solid #0077ff;
    border-radius:12px;
    padding:20px;
    margin-bottom:25px;
    background:#f9fcff;
}

legend{
    background:#0077ff;
    color:white;
    padding:8px 18px;
    border-radius:30px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#333;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:2px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
    border-color:#0077ff;
    box-shadow:0 0 8px rgba(0,119,255,.4);
    outline:none;
}

textarea{
    resize:vertical;
    min-height:120px;
}

.inline{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    margin-top:10px;
}

.inline label{
    font-weight:normal;
}

.buttons{
    text-align:center;
}

button{
    padding:15px 35px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    color:white;
    transition:.3s;
}

.submit{
    background:#28a745;
}

.reset{
    background:#dc3545;
}

button:hover{
    transform:scale(1.05);
}
  
footer{
    text-align:center;
    margin-top:20px;
    color:#555;
}
</style>

</head>
<body>

<div class="container">

<h1>🏥 Hospital Patient Registration Form</h1>

<form>

<!-- Personal Information -->
<fieldset>

<legend>Personal Information</legend>

<div class="grid">

<div>
<label>First Name</label>
<input type="text" placeholder="Ayan" required>
</div>

<div>
<label>Last Name</label>
<input type="text" placeholder="Nouh">
</div>

<div>
<label>Middle Name</label>
<input type="text" placeholder="Jama">
</div>

<div>
<label>Date of Birth</label>
<input type="date" placeholder="12.09.1994">
</div>

<div>
<label>Age</label>
<input type="number" value="31">
</div>

<div>
<label>Gender</label>
<select value="Female">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div>
<label>Blood Group</label>
<select value="A+">
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>
</div>

<div>
<label>National ID</label>
<input type="text" placeholder="123456789">
</div>

<div>
<label>Passport Number</label>
<input type="text" placeholder="A1234567">
</div>

<div>
<label>Marital Status</label>
<select value="Single">
<option>Single</option>
<option>Married</option>
<option>Divorced</option>
<option>Widowed</option>
</select>
</div>

</div>

</fieldset>

<!-- Contact Information -->

<fieldset>

<legend>Contact Information</legend>

<div class="grid">

<div>
<label>Email</label>
<input type="email" placeholder="ayan.nouh1@gmail.com">
</div>

<div>
<label>Phone</label>
<input type="tel" placeholder="123-456-7890">
</div>

<div>
<label>Emergency Phone</label>
<input type="tel" placeholder="098-765-4321">
</div>

<div>
<label>Website</label>
<input type="url" placeholder="https://www.hospital.com">

</div>

<div>
<label>Address</label>
<input type="text" placeholder="123 Main St">
</div>

<div>
<label>City</label>
<input type="text" placeholder="New York">
</div>

<div>
<label>State</label>
<input type="text" placeholder="NY">
</div>
</div>

<div>
<label>Country</label>
<input type="text" placeholder="USA">
</div>

<div>
<label>Zip Code</label>
<input type="text" placeholder="10001">
</div>

</div>

</fieldset>

<!-- Medical Information -->

<fieldset>

<legend>Medical Information</legend>

<div class="grid">

<div>
<label>Height (cm)</label>
<input type="number" placeholder="175">
</div>

<div>
<label>Weight (kg)</label>
<input type="number" placeholder="70">
</div>

<div>
<label>Appointment Date</label>
<input type="date" placeholder="2023-12-31">
</div>

<div>
<label>Appointment Time</label>
<input type="time" placeholder="09:00">
</div>
</div>

<div>
<label>Preferred Doctor</label>
<input list="doctors" value="Dr. Ahmed">
<datalist id="doctors">
<option>Dr. Ahmed</option>
<option>Dr. Sarah</option>
<option>Dr. John</option>
<option>Dr. Fatima</option>
</datalist>
</div>

<div>
<label>Department</label>
<select value="Cardiology">
<option>Cardiology</option>
<option>Neurology</option>
<option>Orthopedics</option>
<option>Pediatrics</option>
<option>Dermatology</option>
<option>General Medicine</option>
</select>
</div>

</div>

<label style="margin-top:20px;">Existing Diseases</label>

<div class="inline" style="display: none;">
<label><input type="checkbox"> Diabetes</label>
<label><input type="checkbox"> Hypertension</label>
<label><input type="checkbox"> Asthma</label>
<label><input type="checkbox"> Heart Disease</label>
<label><input type="checkbox"> Kidney Disease</label>
<label><input type="checkbox"> None</label>
</div>

<label style="margin-top:20px;">Allergies</label>
<textarea placeholder="Describe allergies..."> waxan ka helay dhakhtarka iyo sidayy iila dhaqmeen shaqalaha cafimadka ee ku suganiba </textarea>

<label>Current Medications</label>
<textarea placeholder="Current medications..."> dawado tayo leh yaya bixiyaan</textarea>

<label>Medical History</label>
<textarea placeholder="Medical history..."> dawado tayo leh yaya bixiyaan</textarea>

</fieldset>

<!-- Insurance -->

<fieldset>

<legend>Insurance Details</legend>

<div class="grid">

<div>
<label>Insurance Company</label>
<input type="text" placeholder="HealthCare Inc.">
</div>

<div>
<label>Policy Number</label>
<input type="text">
</div>

<div>
<label>Insurance Card</label>
<input type="file" placeholder="Upload insurance card" accept="image/*,application/pdf" photo>
</div>

<div>
<label>Coverage (%)</label>
<input type="range" min="0" max="100">
</div>

</div>

</fieldset>

<!-- Account -->

<fieldset>

<legend>Patient Account</legend>

<div class="grid" >

<div>
<label>Username</label>
<input type="text" placeholder="ayan_nouh" required>
</div>

<div>
<label>Password</label>
<input type="password" placeholder="Kusoco90$" required>
</div>

<div>
<label>Confirm Password</label>
<input type="password" placeholder="Confirm password" required>
</div>
</div>

<div>
<label>Favorite Color</label>
<input type="color">
</div>

<div>
<label>Registration Month</label>
<input type="number" min="1" max="12">
</div>

<div>
<label>Registration Week</label>
<input type="number" min="1" max="52">
</div>

<div>
<label>Search Previous Records</label>
<input type="search">
</div>

<div>
<label>Patient ID</label>
<input type="hidden" value="P001">
</div>

</div>

<div class="inline">

<label>
<input type="radio" name="payment">
Cash
</label>

<label>
<input type="radio" name="payment">
Insurance
</label>

<label>
<input type="radio" name="payment">
Credit Card
</label>

</div>

<br>

<label>
<input type="checkbox" required>
I agree to the hospital terms and privacy policy.
</label>

</fieldset>

<div class="buttons">
<button class="submit" type="submit">Register Patient</button>
<button class="reset" type="reset">Reset Form</button>
</div>

</form>

<footer>
© 2026 CityCare Hospital • Patient Registration System
</footer>

</div>

</body>
</html>
